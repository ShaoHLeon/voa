# 配置 安全检测节点如何限制速度、预测未来轨迹、判断碰撞风险、触发预警或刹停

# ============================================================
# 输入模式
# ============================================================

# input:
#   1: handle      手柄输入模式，当前安全节点处理的是手柄控制输入。
#   2: navigation  导航输入模式
# input    1: handle  2: navigation
mode: 1

# ============================================================
# 高度图输入
# ============================================================
# safety_node 后续默认读取融合后的 GridMap。
# 实际 topic 来自 elevation_mapping 私有命名空间：
#   /elevation_mapping/elevation_map
grid_map_topic: /elevation_mapping/elevation_map
grid_map_layer: elevation
grid_map_frame: odom

robot_base_frame: base_link

# ============================================================
# 第一版障碍检测参数（26-05-26）
# ============================================================
enable_obstacle_check: true

# 当前先假设 odom 的 z=0 附近是地面高度。
# 后续如果实测 leg_odom 的 z 或地图高度有偏移，再改这个值。
obstacle_ground_height: 0.0

# 高于 ground_height 多少认为是障碍，单位 m。
obstacle_height_threshold: 0.12

# 单次预测足迹内至少多少个障碍格才触发停车，避免单点噪声。
obstacle_min_points: 3

# 预测未来多长时间内的轨迹，单位 s。
collision_check_time: 1.0

# 碰撞检测采样间隔，单位 s。
collision_check_dt: 0.10

# == elevation_mapping 输出的是 odom 坐标系下的高度，不一定刚好以地面为 0.0。如果固定用 0.0，机器狗在坡道、地面有偏移、相机标定有误差时，很容易把正常地面当障碍，或者把障碍漏掉。
# 是否从机器人附近的高度图动态估计地面高度。处理器性能不够时，关闭
use_dynamic_ground_height: true

# 地面高度估计半径，单位 m。
# 在机器人当前位置附近取一圈有效 elevation 栅格，用中位数作为当前地面高度。
ground_estimation_radius: 0.35

# 至少需要多少个有效点才认为动态地面估计可信。
ground_min_points: 5

# == 用速度方向作为“安全检查方向”。一个障碍点如果在机器人坐标系下投影到运动方向的前方，才参与碰撞判断。
# 有平移速度时，只检查运动方向前方的障碍。
# 例如向前走时忽略后方高点，向左平移时忽略右侧高点。
directional_obstacle_check: true

# 平移速度低于该值时，认为机器人接近原地运动，检查完整足迹。
motion_direction_deadband: 0.03

# 障碍点在运动方向上的投影至少超过该距离才参与判断，单位 m。
# 作用是忽略机器人中心附近的噪点和脚下高点。
directional_min_projection: 0.05

# ============================================================
# 减速 / 刹停策略
# safety_node 预测未来轨迹时，其实可以知道“第几个预测点会撞”。第一个碰撞点越远，说明风险越低，可以先减速；第一个碰撞点越近，说明已经来不及绕或调整，直接停车更安全。
# ============================================================
# true: 远处障碍先减速，近处障碍再停车。
# false: 只要预测路径有障碍就直接停车。
enable_slow_down: true

# 预测碰撞时间小于该值时，直接停车，单位 s。
stop_time_threshold: 0.35

# 预测碰撞时间小于该值时开始减速，单位 s。
# 建议 <= collision_check_time
slow_down_time_threshold: 1.0

# 减速时的最小速度比例。
# 例如 0.25 表示最慢降到原速度的 25%，再近就停车。
min_slow_down_scale: 0.25

# ============================================================
# 替代速度候选 / 简单绕障
# ============================================================
# 当前指令预测会撞障碍物时，先尝试几个能绕行的替代速度。
# 如果找到安全候选，就发布该候选速度；找不到才进入减速/停车。
enable_avoidance_candidates: true

# 替代速度的横向绕障速度，单位 m/s。
# base_link 坐标系中，linear.y > 0 表示向左，linear.y < 0 表示向右。
avoidance_lateral_speed: 0.20

# 保留多少前进速度。
# 0.35 表示绕障时只保留原前进速度的 35%，避免边绕边高速撞上。
avoidance_forward_scale: 0.35

# 绕障候选是否保留原始 yaw 角速度。
# 第一版建议设为 0.0，避免边转向边横移导致预测不稳定。
avoidance_yaw_scale: 0.0

# 原始平移速度低于该值时，不触发替代速度候选。
# 例如原地旋转或极低速微调时，不主动横移绕障。
avoidance_min_input_speed: 0.05

# 避障方向保持，防止左右候选速度来回切换。
enable_avoidance_direction_hold: true

# 成功选择一次左绕/右绕后，在该时间内优先继续尝试同方向。
avoidance_direction_hold_time: 0.5

# 候选速度选择代价权重。
# 权重越大，表示越不希望该速度分量偏离原始 /cmd_vel。
avoidance_forward_cost_weight: 1.0
avoidance_lateral_cost_weight: 1.0
avoidance_yaw_cost_weight: 0.3

# 方向保持期间，如果候选方向和上一次绕障方向相反，额外增加代价。
# 用于抑制左/右绕障来回切换。
avoidance_direction_switch_cost: 0.30

# ============================================================
# 速度指令输入 / 输出
# ============================================================
# 安全节点推荐作为速度链路中的过滤器：
#   上游控制器 /cmd_vel
#       -> safety_node
#       -> /cmd_vel_corrected
#       -> ros2qnx
#
# 注意：
# 当前 transfer/src/message_transformer/src/ros2qnx.cpp 同时订阅 cmd_vel 和 cmd_vel_corrected。
cmd_vel_input_topic: /cmd_vel
cmd_vel_output_topic: /cmd_vel_corrected

# ============================================================
# 调试状态输出
# ============================================================
# 发布 safety_node 当前决策状态，方便上机调试。
# 只用于观察，不参与控制闭环。
publish_debug_status: true
debug_status_topic: /voa/safety_status

# 如果长时间收不到高度图，是否强制停车。
stop_when_map_timeout: true
map_timeout: 0.5

# 如果长时间收不到速度指令，输出零速度。
cmd_timeout: 0.5

# ============================================================
# 速度限制参数
# ============================================================

# velocity  
# x 方向最大前进速度，单位通常是 m/s
vel_x_max: 0.5
# x 方向最大后退速度，单位通常是 m/s
vel_x_back_max: 0.5
# y 方向最大侧向速度，单位通常是 m/s
vel_y_max: 0.6
# 最大偏航角速度，单位通常是 rad/s
vel_yaw_max: 1.2

# ============================================================
# 加速度限制参数
# ============================================================
# 只在正常 pass 放行时限制加速度。
# 障碍减速、急停、地图超时停车不经过加速度限制，保证安全动作立即生效。
enable_acceleration_limit: true
acc_x: 0.6
acc_y: 0.5
acc_yaw: 0.8

# ============================================================
# 机器人尺寸参数
# ============================================================
# robot size
# base_link 到机器人最前端的距离，单位 m
len_base_front: 0.5
# base_link 到机器人最后端的距离，单位 m
len_base_back: 0.62
# base_link 到机器人左右侧边界的距离，单位 m
len_base_side: 0.3

# 安全膨胀距离，单位 m。
# 用于把机器人矩形足迹向前、后、左右额外扩大一圈。
safety_margin: 0.10

# ============================================================
# 安全节点处理频率
# ============================================================
# process rate，表示 safety_node 每秒运行 50 次。
rate: 50

# ============================================================
# 未来轨迹预测参数
# ============================================================
# predict，最多预测未来 2.6 秒内的运动轨迹。
predict_t_max: 2.6
# 预测时间步长，单位 s，每隔 0.01 秒计算一个预测位姿。一次完整预测最多会生成约 260 个未来位姿点。
predict_dt: 0.01
# 系统延迟补偿时间，单位 s
delay_t: 0.1

# ============================================================
# 碰撞检测参数
# ============================================================
# collision detect
# 碰撞检测时间间隔，单位 s
detect_dt: 0.2
# 一级预警时间阈值，单位 s
# 如果预测在未来 t_warn 秒内可能发生碰撞或进入危险区域，
t_warn: 1.5
# 二级预警时间阈值，单位 s
t_warn2: 1.0

# ============================================================
# 刹车模式
# ============================================================
# 速度代价权重
vel_cost_weight: 1.0
# brake mode  
only_brake: false

t_warn3: 1.8
t_warn4: 1.0
